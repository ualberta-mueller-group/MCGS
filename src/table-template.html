<!DOCTYPE HTML>
<html>
    <head>
        <title>MCGS Test Output</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

        <style>
            * {
                box-sizing: border-box;
                margin: 0px;
                padding: 0px;
            }

            body {
                width: 100vw;
                font-family: "Noto Serif";
            }

            table {
                table-layout: auto;
                width: 100vw;
                border-spacing: 0;
                border-collapse: collapse;
            }

            tr {
                border-bottom: 1px solid black;
            }

            td, th {
                border-right: 1px solid black;
                padding: 0px;
            }

            td:last-child, th:last-child {
                border-right: 0px;
            }

            tr:nth-child(odd) {
                /*background-color: #d8d8d8;*/
                background-color: #e6e6e6;
            }

            tr:nth-child(1) {
            }

            .cell div {
                overflow-wrap: break-word;
                /*overflow: scroll;*/
                padding: 2px;
            }

            .cell-pass {
                background-color: #00ff00;
            }

            .cell-fail {
                background-color: #ff0000;
            }


            .cell-timeout {
                background-color: #ff8000;
            }

            .cell-completed {
                background-color: yellow;
            }

            .cell-wrong-hash {
                background-color: #5c5cff;
            }

            .cell-diverging-result {
                background-color: #ff00ff;
            }

            .select-div {
                padding-top: 20px;
                padding-bottom: 20px;
            }


            td.break-anywhere div {
                overflow-wrap: anywhere;
            }

            .cell-faster {
                background-color: #40ffa0;
            }

            .cell-slower {
                background-color: #ff8080;
            }

            .cell-new-fail {
                background-color: #990000;
            }

            .cell-new-pass {
                /*background-color: #66ff66;*/
                background-color: #004d00;
            }

            .cell-new-completed {
                background-color: #999900;

            }

            .cell-new-timeout {
                background-color: #994d00;
            }

            .filter-text-div {
                display: inline-block;
                margin-bottom: 10px;
            }

            tr.row-header {
                border-top: 1px solid black;
                background-color: #afafaf;
            }

            #outcome-filter-dropdown {
                margin-top: 1.2em;
                margin-bottom: 1.2em;
            }

            div.sep {
                background-color: red;
                width: 15px;
                display: inline-block;
            }

            #metadata-string {
                white-space-collapse: preserve;
            }

            #problem-summary {
                white-space-collapse: preserve;
                font-weight: bold;
            }

            #python-warnings ul {
                list-style-type: square;
                padding-left: 1em;
            }

            .th-index {
                cursor: pointer;
            }

            /* ".row" for higher specificity, to override other bg colors */
            .row.row-duplicate {
                background-color: #ffb0ff;
            }

            #data-table {
                visibility: hidden;
            }

            #top-grid {
                display: grid;
                grid-template-columns: 3fr 1fr;
                grid-auto-rows: auto;
                padding-bottom: 10px;
                width: 100vw;
            }

            .grid-left-top {
                grid-column: 1;
                grid-row: 1;
            }

            .grid-left-bottom {
                grid-column: 1;
                grid-row: 2;
            }

            .grid-right {
                grid-column: 2;
                grid-row: 1 / span 2;
            }

            #vis-checkbox-div {
                display: inline-block;
            }

            #vis-checkbox-list {
                list-style: none;
                display: inline-block;
                overflow-y: scroll;
                overflow-x: auto;
                overscroll-behavior: contain;
                background-color: #afafaf;
                max-height: 16em;
                box-shadow: black 1px 1px 2px;
            }

            #vis-checkbox-list li {
                display: table-row;
            }

            #vis-checkbox-list li * {
                display: table-cell;
            }

            .hide-column {
                display: none;
            }

            .games-cell {
                min-width: 12em;
            }

            .input-div {
                display: inline-block;
            }

            #sort-radio-div {
                background-color: red;
                vertical-align: top;
                display: inline-block;
            }

            #sort-radio-list {
                list-style: none;
                display: inline-block;
                overflow-y: scroll;
                overscroll-behavior: contain;
                background-color: orange;
                max-height: 16em;
                box-shadow: black 1px 1px 2px;
            }

            #sort-radio-list li {
                background-color: yellow;
                display: table-row;
            }

            #sort-radio-list li * {
                background-color: green;
                display: table-cell;
            }

        </style>

        <script>
<!-- REPLACE WITH SCRIPT -->
        </script>

    </head>

    <body>

    <div id="top-grid">
        <div class="grid-left-top">
            <!-- REPLACE WITH METADATA -->

            <p id="problem-summary"></p>
            <!-- REPLACE WITH PYTHON WARNINGS -->
        </div> <!-- .grid-left-top -->


        <div class="grid-left-bottom">

            <div class="input-div">
                <label for="outcome-filter-dropdown">Show rows: </label>
                <select name="outcome-filter" id="outcome-filter-dropdown">
                    <option value="all">All</option>
                    <option value="problem">Problems</option>
                    <option value="fail">Fails</option>
                    <option value="diverging-result">Diverging results</option>
                    <option value="timeout">Timeouts</option>
                    <option value="hash">Bad hashes</option>
                    <option value="duplicate">Duplicate Tests</option>
                    <option value="no-problem">No problems</option>
                </select>
            </div>

            <br>

            <div class="input-div">
                <label for="filter-text-input">Search: </label>
                <textarea type="text" id="filter-text-input"></textarea>
            </div>

            <div class="sep"></div>

            <div class="input-div">
                <label for="filter-text-exclude">Exclude</label>
                <input type="checkbox" id="filter-text-exclude">
            </div>

            <div class="sep"></div>

            <div class="input-div">
                <label for="filter-text-regex">Regex</label>
                <input type="checkbox" id="filter-text-regex">
            </div>

            <div class="sep"></div>

            <div class="input-div">
                <label for="filter-text-column-select">Search column: </label>
                <select id="filter-text-column-select">
                    <!-- REPLACE WITH COLUMN OPTIONS -->
                </select>
            </div>

            <div class="sep"></div>

            <div class="input-div">
                <label for="sort-by-time-checkbox">Sort by time</label>
                <input type="checkbox" id="sort-by-time-checkbox">
            </div>
        </div> <!-- .grid-left-bottom -->

        <div class="grid-right">
            <div id="vis-checkbox-div">
                <p>Column visibility:</p>
                <ul id="vis-checkbox-list">
                    <!-- REPLACE WITH VIS CHECKBOXES -->
                </ul>
            </div> <!-- #vis-checkbox-div -->


            <div id="sort-radio-div">
                <p>Sort by:</p>
                <ul id="sort-radio-list">
                    <li>
                    <input type="radio" name="sort-radio-value" value="none" id="sort-radio-none">
                    </input>
                    <label for="sort-radio-none">None</label>
                    </li>

                    <li>
                    <input type="radio" name="sort-radio-value" value="time" id="sort-radio-time">
                    </input>
                    <label for="sort-radio-time">Time (ms)</label>
                    </li>

                    <li>
                    <input type="radio" name="sort-radio-value" value="node-count" id="sort-radio-node-count">
                    </input>
                    <label for="sort-radio-nodes">Node Count</label>
                    </li>


                </ul>
            </div> <!-- #sort-radio-div -->

        </div> <!-- .grid-right -->

    </div> <!-- #top-grid -->

        <!-- REPLACE WITH TABLE -->

    </body>
</html>
